<div class="login-container">

    <p-toast></p-toast>

    <div class="shape shape1"></div>
    <div class="shape shape2"></div>

    <div class="login-card">
        <h2>Recuperar Senha</h2>

        <form (ngSubmit)="recuperar()">
            <div class="input-group">
                <i class="pi pi-user icon"></i>
                <input type="text" [(ngModel)]="cpf" name="cpf" placeholder="CPF" (input)="formatarCpf()" />
            </div>

            <div class="input-group">
                <i class="pi pi-lock icon"></i>
                <input type="password" [(ngModel)]="novaSenha" name="novaSenha" placeholder="Nova Senha" />
            </div>

            <div class="input-group">
                <i class="pi pi-lock icon"></i>
                <input type="password" [(ngModel)]="confirmarSenha" name="confirmarSenha"
                    placeholder="Confirmar Senha" />
            </div>

            <button class="login-btn" [disabled]="carregando">
                {{ carregando ? 'Processando...' : 'Recuperar Senha' }}
            </button>
        </form>

        <p class="signup-text">
            Lembrou sua senha?
            <a routerLink="/login" style="color: #0066cc;">Volte ao login</a>
        </p>
    </div>

    <div class="side-text">
        <h1>E-FICHA RB</h1>
    </div>
</div>
