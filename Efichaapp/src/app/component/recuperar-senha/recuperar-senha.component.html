<div class="login-container">

    <p-toast></p-toast>

    <div class="shape shape1"></div>
    <div class="shape shape2"></div>

    <div class="login-card">
        <h2>Recuperar Senha</h2>

        <form (ngSubmit)="recuperar()">
            <div class="input-group">
                <i class="pi pi-user icon"></i>
                <input type="text" [(ngModel)]="cpf" name="cpf" placeholder="CPF" (input)="formatarCpf()" />
            </div>

            <div class="input-group">
                <i class="pi pi-lock icon"></i>
                <input [type]="mostrarSenha1 ? 'text' : 'password'" [(ngModel)]="novaSenha" name="novaSenha" placeholder="Nova Senha" />
                <i class="pi toggle-icon" [ngClass]="mostrarSenha1 ? 'pi-eye-slash' : 'pi-eye'" (click)="alternarVisibilidadeSenha1()"></i>
            </div>

            <div *ngIf="novaSenha" class="senha-strength">
                <div class="strength-meter">
                    <div 
                        class="strength-meter-fill" 
                        [style.width.%]="avaliarForcaSenha().nivel * 33.33"
                        [style.backgroundColor]="avaliarForcaSenha().cor">
                    </div>
                </div>
                <span class="strength-text" [style.color]="avaliarForcaSenha().cor">
                    Força: {{ avaliarForcaSenha().forca }}
                </span>
            </div>

            <div class="input-group">
                <i class="pi pi-lock icon"></i>
                <input [type]="mostrarSenha2 ? 'text' : 'password'" [(ngModel)]="confirmarSenha" name="confirmarSenha" placeholder="Confirmar Senha" />
                <i class="pi toggle-icon" [ngClass]="mostrarSenha2 ? 'pi-eye-slash' : 'pi-eye'" (click)="alternarVisibilidadeSenha2()"></i>
            </div>

            <button class="login-btn" [disabled]="carregando">
                {{ carregando ? 'Processando...' : 'Recuperar Senha' }}
            </button>
        </form>

        <p class="signup-text">
            Lembrou sua senha?
            <a routerLink="/login" style="color: #0066cc;">Volte ao login</a>
        </p>
    </div>

    <div class="side-text">
        <h1>E-FICHA RB</h1>
    </div>
</div>
