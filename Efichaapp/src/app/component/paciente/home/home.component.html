<div class="home">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">E-FICHA</div>

        <div class="user">
            <i class="pi pi-user"></i>
            <span>{{ usuario?.nome }}</span>

            <button class="btn sair" (click)="sair()">
                <i class="pi pi-sign-out"></i>
                Sair
            </button>
        </div>
    </nav>

    <!-- Banner -->
    <header class="header">
        <h1>Olá, {{ usuario?.nome }}!</h1>
        <p>Bem-vinda ao E-Ficha</p>
    </header>

    <!-- Cards -->
    <div class="cards-container">

        <div class="card" *ngFor="let card of cards" [routerLink]="card.route">
            <i [ngClass]="card.icon"></i>
            <h3 [innerHTML]="card.title"></h3>
        </div>

    </div>

    <!-- Próxima consulta -->
    <div class="consulta">

        <h2>Próxima Consulta</h2>

        <div *ngIf="proximaReserva as reserva; else semReserva" class="info">
            <p><i class="pi pi-map-marker"></i> {{ reserva.postoSaude?.nome || 'Posto não informado' }}</p>
            <p><i class="pi pi-calendar"></i> {{ reserva.dataReserva | date:'dd/MM/yyyy' }}</p>
            <p *ngIf="reserva.status"><i class="pi pi-info-circle"></i> Status: {{ reserva.status }}</p>
        </div>

        <ng-template #semReserva>
            <div class="info vazio">
                <p>Ainda não existe reserva!</p>
            </div>
        </ng-template>

        <button>Ver detalhes</button>

    </div>
</div>
